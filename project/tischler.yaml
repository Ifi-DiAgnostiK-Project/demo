meta:
  title: DiAgnostiK – Tischler
  description: >
    Umfangreiche Lerneinheiten für Tischler: Holzarten, Holzverbindungen,
    Gefahrstoffe, technische Schutzmaßnahmen sowie Oberflächenbehandlung
    in verschiedenen Schwierigkeitsstufen.

# Main course collection
collection:
  - html: >
      <div style="padding: 20px; background-color: rgba(26, 47, 94, 0.1); border-radius: 8px; margin: 20px 0;">
        <h2>🪵 Tischler</h2>
        <p>
          Diese umfangreiche Sammlung deckt <strong>zentrale Themen der Tischlerausbildung</strong> ab –
          von der Holzartenbestimmung über Holzverbindungen und Gefahrstoffe bis hin zu
          technischen Schutzmaßnahmen und Oberflächenbehandlung.
        </p>
        <p>
          Die Lerneinheiten zu Technischen Schutzmaßnahmen (TSM) stehen in unterschiedlichen
          Schwierigkeitsstufen zur Verfügung und ermöglichen eine differenzierte Prüfungsvorbereitung.
        </p>
      </div>


