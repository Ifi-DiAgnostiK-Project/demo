# Main course collection
collection:
  - html: >
      <div style="padding: 20px; background-color: rgba(26, 47, 94, 0.1); border-radius: 8px; margin: 20px 0;">
        <h2>🦷 Zahntechniker</h2>
        <p>
          Diese Sammlung bietet <strong>Lerneinheiten für die zahntechnische Ausbildung</strong> –
          von einem allgemeinen Grundkurs über Einbettmassen bis hin zu spezifischen
          Modulen zu Zahnformen, Prothesen und prothetischen Konstruktionen.
        </p>
        <p>
          Die Inhalte unterstützen sowohl die theoretische Prüfungsvorbereitung als auch
          das Verständnis zahntechnischer Arbeitsprozesse und Materialien.
        </p>
      </div>


