meta:
  title: DiAgnostiK – Digitaler Lehr- und Lernraum für das Handwerk
  description: >
    Der DiAgnostiK Lernraum bietet interaktive, branchenspezifische Lernmodule
    für Tischler, SHK, Zahntechniker, Maler, Raumausstatter und weitere
    Handwerksberufe – gefördert durch die EU und den Freistaat Sachsen.

# Main course collection
collection:
  - html: >
      <div style="padding: 20px; background-color: rgba(26, 47, 94, 0.1); border-radius: 8px; margin: 20px 0;">
        <h2>🏠 Willkommen im DiAgnostiK Lernraum</h2>
        <p>
          Der <strong>DiAgnostiK Lehr- und Lernraum</strong> stellt interaktive, digitale Lernmaterialien
          für die berufliche Ausbildung im Handwerk bereit – entwickelt in Zusammenarbeit mit der
          Handwerkskammer Dresden und der TU Bergakademie Freiberg.
        </p>
        <p>
          Wählen Sie eine Berufsgruppe aus der Navigation, um zu den passenden Lerneinheiten zu gelangen.
          Alle Kurse sind kostenlos zugänglich und können direkt im Browser genutzt werden.
        </p>
      </div>

